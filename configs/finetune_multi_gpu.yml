# =============================================================================
# OpenFold3 fine-tuning  ·  MULTI-GPU / MULTI-NODE  (larger datasets)
# -----------------------------------------------------------------------------
# Structure-loss fine-tuning scaled out. Mirrors examples/training_yamls/
# finetune_1.yml (devices:8, num_nodes:32 in the original OF3p run). For ~10-50
# structures you do NOT need this — use finetune_lowN_single_gpu.yml.
#
# When scaling up, relax the low-n overrides back toward defaults:
#   more steps · longer warmup (toward 1000) · higher EMA decay (toward 0.999)
# and KEEP the distillation datasets at sampling weights to protect generality.
#
# USAGE:
#   1) Edit <<< EDIT >>> paths and devices/num_nodes.
#   2) Ensure /shared/openfold3 is mounted identically on ALL nodes.
#   3) run_openfold train --runner-yaml finetune_multi_gpu.yml --seed 42
# =============================================================================

experiment_settings:
  mode: train
  output_dir: /shared/openfold3/finetune_output                    # <<< EDIT (shared) >>>
  seed: 42
  restart_checkpoint_path: /shared/openfold3/of3-p2-155k.pt        # <<< EDIT (abs path) >>>
  ckpt_load_settings:
    manual_checkpoint_loading: true
    init_from_ema_weights: false     # set true ONLY when resuming your own .ckpt
    restore_lr_scheduler: false
    restore_time_step: false
    strict_loading: false

data_module_args:
  batch_size: 1
  num_workers: 16
  epoch_len: 128000                  # ckpt every ~500 steps (matches finetune_1)

logging_config:
  log_lr: true
  wandb_config:
    project: openfold3-finetune
    entity: your-wandb-entity        # <<< EDIT >>>
    experiment_name: finetune-scaled
    group: null
    id: null

pl_trainer_args:
  devices: 8                         # <<< EDIT >>> GPUs PER NODE
  num_nodes: 4                       # <<< EDIT >>> total nodes (1 for a single box)
  precision: bf16-mixed
  max_epochs: -1
  log_every_n_steps: 50
  mpi_plugin: false
  deepspeed_config_path: null        # optional: ./deepspeed_configs/<cfg>.json

checkpoint_config:
  every_n_epochs: 1
  auto_insert_metric_name: false
  save_last: true
  save_top_k: -1

# -----------------------------------------------------------------------------
# Hyperparameters — for a LARGER run, move these toward training defaults.
# (defaults: lr 1.8e-3, warmup 1000, ema 0.999 — see model_config.py)
# -----------------------------------------------------------------------------
model_update:
  presets:
    - train
  custom:
    settings:
      model_selection_weight_scheme: fine_tuning
      optimizer:
        learning_rate: 0.0005        # below the 1.8e-3 from-scratch value
      lr_scheduler:
        warmup_no_steps: 200         # raise toward 1000 for long runs
      ema:
        decay: 0.999
      memory:
        train:
          msa_module:
            swiglu_seq_chunk_size: 1024   # from finetune_1 (memory control)
    architecture:
      shared:
        use_confidence_emb_prob: 0.8
        diffusion:
          no_samples: 32             # finetune_1 setting
          use_conditioning_prob: 0.8
      loss_module:
        diffusion:
          chunk_size: 2

dataset_configs:
  train:
    weighted-pdb:
      dataset_class: WeightedPDBDataset
      weight: 1.0                    # set <1 and add distillation sets to fight forgetting
      config:
        debug_mode: false
        template:
          n_templates: 4             # enable templates if you built the template cache
          take_top_k: false
        crop:
          token_crop:
            enabled: true
            token_budget: 640        # finetune_1 value
            crop_weights:
              contiguous: 0.2
              spatial: 0.4
              spatial_interface: 0.4
          chain_crop:
            enabled: true
        loss:
          loss_weights:
            bond: 4.0
            smooth_lddt: 0.0

    # OPTIONAL — to protect general performance, re-add the distillation datasets
    # exactly as in examples/training_yamls/finetune_1.yml (with their dataset_paths):
    #   long-monomer-distillation / short-monomer-distillation /
    #   disordered-pdb / RNA-monomer-distillation
    # Set weighted-pdb weight ~0.5 and distribute the rest across them.

  validation:
    val-weighted-pdb:
      dataset_class: ValidationPDBDataset
      config:
        debug_mode: false
        msa:
          subsample_main: false
        template:
          n_templates: 4
          take_top_k: true
        crop:
          token_crop:
            enabled: false

dataset_paths:
  weighted-pdb:
    alignments_directory: none
    alignment_db_directory: none
    alignment_array_directory:   /shared/openfold3/finetune/alignment_arrays                       # <<< EDIT >>>
    dataset_cache_file:          /shared/openfold3/finetune/dataset_caches/training_cache.json     # <<< EDIT >>>
    target_structures_directory: /shared/openfold3/finetune/preprocessed/standard/structure_files  # <<< EDIT >>>
    target_structure_file_format: npz
    reference_molecule_directory: /shared/openfold3/finetune/preprocessed/standard/reference_mols  # <<< EDIT >>>
    template_cache_directory: /shared/openfold3/finetune/templates/train_template_cache            # <<< EDIT or 'none' >>>
    template_structure_array_directory: /shared/openfold3/finetune/templates/template_structure_arrays  # <<< EDIT or 'none' >>>
    template_structures_directory: none
    template_file_format: npz
    ccd_file: null

  val-weighted-pdb:
    alignments_directory: none
    alignment_db_directory: none
    alignment_array_directory:   /shared/openfold3/finetune/alignment_arrays                       # <<< EDIT >>>
    dataset_cache_file:          /shared/openfold3/finetune/dataset_caches/validation_cache.json   # <<< EDIT >>>
    target_structures_directory: /shared/openfold3/finetune/preprocessed/standard/structure_files  # <<< EDIT >>>
    target_structure_file_format: npz
    reference_molecule_directory: /shared/openfold3/finetune/preprocessed/standard/reference_mols  # <<< EDIT >>>
    template_cache_directory: /shared/openfold3/finetune/templates/val_template_cache              # <<< EDIT or 'none' >>>
    template_structure_array_directory: /shared/openfold3/finetune/templates/template_structure_arrays  # <<< EDIT or 'none' >>>
    template_structures_directory: none
    template_file_format: npz
    ccd_file: null
