# =============================================================================
# OpenFold3 low-n fine-tuning  ·  SINGLE GPU (80 GB H100 / A100-80GB)
# -----------------------------------------------------------------------------
# Reproduces the Apheris PDE10A recipe: ~10 protein-ligand complexes, ~350 steps,
# templates OFF, structure loss ON, gentle LR/EMA so the model is NUDGED.
# Loads the PUBLIC weights (of3-p2-155k.pt) DIRECTLY — no .pt->.ckpt conversion.
#
# All key paths/values below were verified against the openfold-3 source:
#   defaults  -> openfold3/projects/of3_all_atom/config/model_config.py
#   ckpt load -> openfold3/core/utils/checkpoint_loading_utils.py
#                openfold3/entry_points/experiment_runner.py / validator.py
#   recipe    -> examples/training_yamls/finetune_1.yml (structure-loss stage)
#
# USAGE:
#   1) Edit paths marked  <<< EDIT >>>
#   2) run_openfold train --runner-yaml finetune_lowN_single_gpu.yml --seed 42
# =============================================================================

experiment_settings:
  mode: train
  output_dir: ./finetune_pde10a_output
  seed: 42
  # Fine-tune FROM the public weights. The released .pt is a raw state dict;
  # the loader auto-detects it (no "module"/"state_dict"/"ema" keys) and loads
  # it directly. restart_checkpoint_path must be an existing file (validator).
  restart_checkpoint_path: /root/.openfold3/of3-p2-155k.pt        # <<< EDIT (abs path) >>>
  ckpt_load_settings:
    manual_checkpoint_loading: true   # REQUIRED to load a bare .pt
    init_from_ema_weights: false      # .pt has no EMA block -> raw-pretrained path used
    restore_lr_scheduler: false       # fresh LR schedule for the fine-tune
    restore_time_step: false          # start global_step at 0
    strict_loading: false             # tolerate head/key differences

data_module_args:
  batch_size: 1
  num_workers: 8
  # epoch_len = effective_batch_size * steps between checkpoints.
  # Small here so you checkpoint a few times within a ~350-step run.
  epoch_len: 100

logging_config:
  log_lr: true
  wandb_config:                       # set the whole block to null to disable W&B
    project: openfold3-finetune
    entity: your-wandb-entity         # <<< EDIT >>>
    experiment_name: pde10a-lowN
    group: null
    id: null

pl_trainer_args:
  devices: 1
  num_nodes: 1
  precision: bf16-mixed
  max_epochs: -1                      # stop via step budget, not epochs
  log_every_n_steps: 10
  mpi_plugin: false
  deepspeed_config_path: null

checkpoint_config:
  every_n_epochs: 1
  auto_insert_metric_name: false
  save_last: true
  save_top_k: -1                      # keep all checkpoints

# -----------------------------------------------------------------------------
# THE LOW-N OVERRIDES (defaults shown in comments; values are the PDE10A recipe)
# -----------------------------------------------------------------------------
model_update:
  presets:
    - train
  custom:
    settings:
      model_selection_weight_scheme: fine_tuning
      optimizer:
        learning_rate: 0.0003         # default 1.8e-3  -> 6x lower, gentle nudge
        # beta1: 0.9                  # defaults; uncomment only to change
        # beta2: 0.95
        # eps: 1.0e-8
      lr_scheduler:
        warmup_no_steps: 50           # default 1000 (never finishes in ~350 steps)
        # base_lr: 0.0                # defaults below are fine for a short run
        # start_decay_after_n_steps: 50000
        # decay_every_n_steps: 50000
        # decay_factor: 0.95
      ema:
        decay: 0.99                   # default 0.999 -> lets averaged weights move
      # gradient_clipping: per-sample, clip_val 10.0 (default; leave as is)
    architecture:
      shared:
        use_confidence_emb_prob: 0.8
        diffusion:
          use_conditioning_prob: 0.8
          # no_samples: 32            # finetune_1 uses 32; raise if memory allows

dataset_configs:
  train:
    weighted-pdb:
      dataset_class: WeightedPDBDataset
      weight: 1.0
      config:
        debug_mode: false
        template:
          n_templates: 0              # templates OFF (PDE10A setting)
          take_top_k: false
        crop:
          token_crop:
            enabled: true
            token_budget: 384         # finetune_1 uses 640; lower = less memory
            crop_weights:
              contiguous: 0.2
              spatial: 0.4
              spatial_interface: 0.4  # bias crops toward the binding interface
          chain_crop:
            enabled: true
        loss:
          loss_weights:
            bond: 4.0                 # matches finetune_1 (helps ligand geometry)
            smooth_lddt: 0.0

  validation:
    val-weighted-pdb:
      dataset_class: ValidationPDBDataset
      config:
        debug_mode: false
        msa:
          subsample_main: false
        template:
          n_templates: 0
          take_top_k: false
        crop:
          token_crop:
            enabled: false            # evaluate on full structures

# -----------------------------------------------------------------------------
# DATA PATHS — all from your Phase 2 preprocessing output
# -----------------------------------------------------------------------------
dataset_paths:
  weighted-pdb:
    alignments_directory: none
    alignment_db_directory: none
    alignment_array_directory:   /shared/openfold3/finetune/alignment_arrays                       # <<< EDIT >>>
    dataset_cache_file:          /shared/openfold3/finetune/dataset_caches/training_cache.json     # <<< EDIT >>>
    target_structures_directory: /shared/openfold3/finetune/preprocessed/standard/structure_files  # <<< EDIT >>>
    target_structure_file_format: npz
    reference_molecule_directory: /shared/openfold3/finetune/preprocessed/standard/reference_mols  # <<< EDIT >>>
    template_cache_directory: none
    template_structure_array_directory: none
    template_structures_directory: none
    template_file_format: npz
    ccd_file: null

  val-weighted-pdb:
    alignments_directory: none
    alignment_db_directory: none
    alignment_array_directory:   /shared/openfold3/finetune/alignment_arrays                       # <<< EDIT >>>
    dataset_cache_file:          /shared/openfold3/finetune/dataset_caches/validation_cache.json   # <<< EDIT >>>
    target_structures_directory: /shared/openfold3/finetune/preprocessed/standard/structure_files  # <<< EDIT >>>
    target_structure_file_format: npz
    reference_molecule_directory: /shared/openfold3/finetune/preprocessed/standard/reference_mols  # <<< EDIT >>>
    template_cache_directory: none
    template_structure_array_directory: none
    template_structures_directory: none
    template_file_format: npz
    ccd_file: null
