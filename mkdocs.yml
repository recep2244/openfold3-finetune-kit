site_name: openfold3-finetune-kit
site_description: Target-specific fine-tuning for OpenFold3 — data prep, training, and evaluation.
site_author: Recep Adiyaman
site_url: https://recep2244.github.io/openfold3-finetune-kit/
repo_url: https://github.com/recep2244/openfold3-finetune-kit
repo_name: recep2244/openfold3-finetune-kit
edit_uri: edit/main/docs/
copyright: Curated by Recep Adiyaman · Apache-2.0

theme:
  name: material
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.instant
    - toc.follow
    - content.code.copy
    - content.tabs.link
    - search.suggest
    - search.highlight

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - Tutorial: tutorial.md
  - How it works: pipeline.md
  - Configuration: configuration.md
  - Usage reference: usage.md
  - Notebooks (cloud): notebooks.md
  - Hardware:
      - Small GPU (12 GB): small-gpu.md
      - Cloud (80 GB): cloud.md
  - Troubleshooting: troubleshooting.md
  - Background & rationale: background.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.details
  - pymdownx.keys
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

plugins:
  - search
